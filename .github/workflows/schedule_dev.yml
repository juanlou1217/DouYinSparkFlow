# 此工作流用于运行 dev（测试）分支的定时任务，如无特殊需要请使用正式工作流

name: 【dev（测试）分支】抖音自动续火花工具
on:
  workflow_dispatch: # 允许手动触发
jobs:
  run-main:
    timeout-minutes: 20
    runs-on: ubuntu-latest
    environment: user-data
    steps:
    - uses: actions/checkout@v4
      with:
        ref: dev
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    - name: Test Douyin Accessibility
      run: |
        curl -I https://creator.douyin.com/
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    - name: Ensure browsers are installed
      run: playwright install chromium --with-deps --only-shell
    - name: Export Github Environment Variables and Secrets to JSON
      env:
        VARS_JSON: ${{ toJson(vars) }}
        SECRETS_JSON: ${{ toJson(secrets) }}
      run: python utils/export_github_env.py
    - name: Run Spark Sender
      run: python main.py
    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: run-logs
        path: logs/
  workflow-keepalive:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - uses: liskin/gh-workflow-keepalive@v1
